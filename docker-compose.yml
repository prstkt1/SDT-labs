services:
  db:
    image: postgres:15-alpine
    container_name: notes_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: notespasword123
      POSTGRES_DB: notes_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - notes_network
    restart: unless-stopped

  app:
    build: .
    container_name: notes_app
    depends_on:
      - db
    volumes:
      - ./docker-config.json:/etc/mywebapp/config.json
    networks:
      - notes_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: notes_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - notes_network
    restart: unless-stopped

networks:
  notes_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
