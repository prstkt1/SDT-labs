name: CI Pipeline

on:
  push:
    branches: ["main"]
    tags: ["*"] # На анотовані теги
  pull_request:
    branches: ["main"] # На кожен PR в гілку main

jobs:
  test-and-lint:
    name: Run Linters and Tests
    runs-on: ubuntu-latest

    steps:
      # 1: Завантажуємо код репозиторію на ВМ
      - name: Checkout code
        uses: actions/checkout@v4

      # 2: Встановлюємо Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3: Встановлюємо залежності з package.json
      - name: Install dependencies
        run: npm install

      # 4: ESLint
      - name: Run ESLint
        run: npm run lint

      # 5: Запуск тестів Jest
      - name: Run Tests and Coverage
        run: npm run test

      # 6: Завантажуємо звіт про покриття як артефакт
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      # 7: Аналіз Dockerfile (Hadolint)
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      # 8: Аналіз bash-скриптів (Shellcheck)
      - name: Run Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./automation"
