---
- name: Create teacher user
  ansible.builtin.user:
    name: teacher
    shell: /bin/bash
    groups: sudo
    append: true
    password: "{{ teacher_password | password_hash('sha512') }}"
    update_password: on_create
    state: present

- name: Force teacher to change password on first login
  ansible.builtin.command:
    cmd: chage -d 0 teacher
  changed_when: false

- name: Ensure /home/student directory exists
  ansible.builtin.file:
    path: /home/student
    state: directory
    mode: "0755"

- name: Write variant number to /home/student/gradebook
  ansible.builtin.copy:
    content: "{{ student_variant_n }}\n"
    dest: /home/student/gradebook
    owner: root
    group: root
    mode: "0644"

- name: Install common packages
  ansible.builtin.apt:
    name:
      - curl
      - git
      - ufw
      - python3
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Allow SSH through ufw
  community.general.ufw:
    rule: allow
    name: OpenSSH

- name: Enable ufw
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
