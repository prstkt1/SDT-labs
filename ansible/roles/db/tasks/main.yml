---
- name: Set facts
  ansible.builtin.set_fact:
    worker_ip: "{{ hostvars[groups['workers'][0]]['ansible_host'] }}"
    db_ip: "{{ ansible_host }}"

- name: Install dependencies for PostgreSQL repo
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Add PostgreSQL apt key
  ansible.builtin.shell:
    cmd: curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
    creates: /usr/share/keyrings/postgresql.gpg

- name: Add PostgreSQL apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg

- name: Install PostgreSQL 15
  ansible.builtin.apt:
    name:
      - postgresql-15
      - postgresql-contrib
      - python3-psycopg2
    state: present
    update_cache: true

- name: Ensure PostgreSQL is running
  ansible.builtin.systemd:
    name: postgresql
    state: started
    enabled: true

- name: Deploy postgresql.conf
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: /etc/postgresql/15/main/postgresql.conf
    owner: postgres
    group: postgres
    mode: "0644"
  notify: Restart postgresql

- name: Deploy pg_hba.conf
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: /etc/postgresql/15/main/pg_hba.conf
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart postgresql

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Create application database
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ db_name }}"
    state: present

- name: Set postgres user password
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    state: present

- name: Allow PostgreSQL from worker
  community.general.ufw:
    rule: allow
    port: "{{ db_port }}"
    proto: tcp
    src: "{{ worker_ip }}"
